version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./api/uploads:/app/api/uploads
      - ./figures:/app/figures
      - ./skanscan.db:/app/skanscan.db
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./skanscan.db
      - TF_ENABLE_ONEDNN_OPTS=0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
